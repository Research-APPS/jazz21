{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Entrar · jazz21 library</title>
  <link rel="stylesheet" href="/css/biblioteca.css" />
  <link rel="stylesheet" href="{% static 'library/library.css' %}" />
</head>
<body>
  <main class="library-page">
    <h1>jazz21 library</h1>
    <p class="library-lead">Cuaderno privado de progresiones</p>
    <form method="post" class="library-form">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="prog-btn">Entrar</button>
    </form>
    <p class="library-lead"><a href="/">← Volver a la biblioteca</a></p>
  </main>
</body>
</html>
